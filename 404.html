    <script>
      // Single Page Apps for GitHub Pages - IMMEDIATE REDIRECT
      // Handles base path: /website/
      // This script runs immediately, before any other scripts
      (function() {
        var pathSegmentsToKeep = 1; // Keep /website/ segment
        var l = window.location;
        var pathname = l.pathname;
        
        // Remove trailing slash for processing (except root)
        if (pathname.endsWith("/") && pathname.length > 1) {
          pathname = pathname.slice(0, -1);
        }
        
        // Ensure we have the base path
        var pathParts = pathname.split("/").filter(function(p) { return p; });
        var basePath = "/" + (pathParts.length > 0 ? pathParts[0] : "website") + "/";
        
        // Get the rest of the path after the base
        var restOfPath = pathParts.slice(pathSegmentsToKeep).join("/");
        
        // Build redirect path - always include ?/ even if path is empty
        var redirectPath = basePath + "?/" + restOfPath.replace(/&/g, "~and~");
        
        if (l.search && l.search[0] !== "?") {
          redirectPath += "&" + l.search.slice(1).replace(/&/g, "~and~");
        }
        if (l.hash) {
          redirectPath += l.hash;
        }
        
        // IMMEDIATE redirect - use replace to avoid history entry
        // This happens before React loads, so the page will redirect properly
        window.location.replace(
          l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") + redirectPath
        );
      })();
    </script>
    <noscript>

    <div id="root"></div>
    <!-- GitHub Pages SPA redirect handler -->
    <script>
      // Single Page Apps for GitHub Pages
      // Handles redirects from 404.html
      (function (l) {
        if (l.search[1] === "/" && l.search[0] === "?") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          
          // Ensure pathname ends with / for base path
          var pathname = l.pathname;
          if (!pathname.endsWith("/") && pathname.split("/").length <= 3) {
            pathname += "/";
          }
          
          window.history.replaceState(
            null,
            null,
            (pathname.endsWith("/") ? pathname.slice(0, -1) : pathname) + decoded + l.hash
          );
        }
      })(window.location);
    </script>
