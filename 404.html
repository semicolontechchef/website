    <script>
      // Single Page Apps for GitHub Pages - IMMEDIATE REDIRECT
      // Handles base path: /website/
      // This script runs immediately, before any other scripts
      (function() {
        var l = window.location;
        var pathname = l.pathname;
        
        // Normalize pathname
        // Remove trailing slash except for root paths
        if (pathname.endsWith("/") && pathname !== "/" && pathname !== "/website/") {
          pathname = pathname.slice(0, -1);
        }
        
        // Split path into parts and filter empty strings
        var pathParts = pathname.split("/").filter(function(p) { return p.length > 0; });
        
        // Base path is always /website/
        var basePath = "/website/";
        
        // Extract the path after /website/
        // Examples:
        // /website/ar -> pathParts = ["website", "ar"] -> restOfPath = "ar"
        // /website/en -> pathParts = ["website", "en"] -> restOfPath = "en"
        // /website/en/about -> pathParts = ["website", "en", "about"] -> restOfPath = "en/about"
        var restOfPath = "";
        if (pathParts.length > 0 && pathParts[0] === "website") {
          restOfPath = pathParts.slice(1).join("/");
        } else if (pathParts.length > 0) {
          // If path doesn't start with "website", treat all as restOfPath
          restOfPath = pathParts.join("/");
        }
        
        // Build redirect path using ?/ format for SPA routing
        // The ?/ tells the SPA router to handle the path
        var redirectPath = basePath + "?/" + restOfPath.replace(/&/g, "~and~");
        
        // Preserve existing query string (if any, and not the ?/ we just added)
        if (l.search && l.search.length > 0 && !l.search.startsWith("?/")) {
          redirectPath += "&" + l.search.slice(1).replace(/&/g, "~and~");
        }
        
        // Preserve hash
        if (l.hash) {
          redirectPath += l.hash;
        }
        
        // IMMEDIATE redirect - use replace to avoid history entry
        // This happens before React loads, so the page will redirect properly
        var fullUrl = l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") + redirectPath;
        window.location.replace(fullUrl);
      })();
    </script>

    <!-- GitHub Pages SPA redirect handler -->
    <script>
      // Single Page Apps for GitHub Pages
      // Handles redirects from 404.html
      (function (l) {
        if (l.search[1] === "/" && l.search[0] === "?") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");

          // Ensure pathname ends with / for base path
          var pathname = l.pathname;
          if (!pathname.endsWith("/") && pathname.split("/").length <= 3) {
            pathname += "/";
          }

          window.history.replaceState(
            null,
            null,
            (pathname.endsWith("/") ? pathname.slice(0, -1) : pathname) +
              decoded +
              l.hash
          );
        }
      })(window.location);
    </script>
