<!DOCTYPE html>

  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta
      name="description"

    />
    <meta
      name="keywords"
      content="advertising agency, marketing, media production, creative design"
    />
    <meta name="author" content="Semicolon Agency" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Semicolon Agency" />
    <meta
      property="og:title"
      content="Semicolon Agency - Creative Advertising & Media Production"
    />
    <meta
      property="og:description"
      content="Semicolon Agency is a leading advertising agency providing innovative marketing, media production, and strategic planning services."
    />
    <meta property="og:url" content="https://semicolon-adv.com" />
    <meta
      property="og:image"
      content="https://semicolon-adv.com/img/card.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Semicolon Agency - Creative Advertising & Media Production"
    />
    <meta
      name="twitter:description"
      content="Semicolon Agency is a leading advertising agency providing innovative marketing, media production, and strategic planning services."
    />
    <meta
      name="twitter:image"
      content="https://semicolon-adv.com/img/card.png"
    />

    <!-- Language Alternates (will be dynamically updated) -->
    <link rel="alternate" hreflang="en" href="" />
    <link rel="alternate" hreflang="ar" href="" />
    <link rel="alternate" hreflang="x-default" href="" />

    <!-- Canonical URL (will be dynamically updated) -->
    <link rel="canonical" href="" />

    <title>Semicolon Agency</title>

    <!-- Localize meta tags based on URL language (runs before React) -->
    <script>
      (function () {
        // Detect language from URL path
        var pathname = window.location.pathname;
        var lang = "en"; // default

        // Extract language from path: /ar/... or /en/...
        // Also handle query string redirects: /?/ar/...
        var pathMatch = pathname.match(/\/(ar|en)(\/|$|\?)/);
        if (pathMatch) {
          lang = pathMatch[1];
        } else {
          // Check query string for redirects from 404.html
          var search = window.location.search;
          if (search && search.includes("?/")) {
            var queryPath = search.substring(2); // Remove "?/"
            var queryMatch = queryPath.match(/^(ar|en)(\/|$)/);
            if (queryMatch) {
              lang = queryMatch[1];
            }
          }
        }

        // Translations for meta tags
        var translations = {
          en: {
            title: "Semicolon Agency - Creative Advertising & Media Production",
            description:
              "Semicolon Agency is a leading advertising agency providing innovative marketing, media production, and strategic planning services.",
            keywords:
              "advertising agency, marketing, media production, creative design, semicolon",
            locale: "en_US",
          },
          ar: {
            title: "شركة سيمي كولون للدعايه و التسويق",
            description:
              "جروب إعلاني وإنتاجي هو أحدث جروب إعلاني وإنتاجي في المنطقة، ويقدم خدمات إعلانية وإنتاجية مبتكرة وفعالة للعملاء.",
            keywords:
              "جروب إعلاني وإنتاجي, خدمات إعلانية وإنتاجية, مبتكرة وفعالة, للعملاء",
            locale: "ar_SA",
          },
        };

        var t = translations[lang] || translations.en;
        var siteUrl = "https://semicolon-adv.com";

        // Build current URL - preserve full path if available
        var currentUrl = siteUrl + pathname;
        // If pathname doesn't include language, add it
        if (!pathname.match(/\/(ar|en)(\/|$)/)) {
          currentUrl = siteUrl + "/" + lang;
        }

        // Update html lang and dir attributes
        document.documentElement.lang = lang;
        document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";

        // Helper function to update or create meta tag
        function updateMetaTag(name, content, attribute) {
          attribute = attribute || "name";
          var element = document.querySelector(
            "meta[" + attribute + '="' + name + '"]'
          );
          if (!element) {
            element = document.createElement("meta");
            element.setAttribute(attribute, name);
            document.head.appendChild(element);
          }
          element.setAttribute("content", content);
        }

        // Update basic meta tags
        updateMetaTag("description", t.description);
        updateMetaTag("keywords", t.keywords);
        updateMetaTag("language", lang);

        // Update Open Graph meta tags
        updateMetaTag("og:title", t.title, "property");
        updateMetaTag("og:description", t.description, "property");
        updateMetaTag("og:url", currentUrl, "property");
        updateMetaTag("og:locale", t.locale, "property");

        // Update Twitter Card meta tags
        updateMetaTag("twitter:title", t.title);
        updateMetaTag("twitter:description", t.description);

        // Update title
        document.title = t.title;

        // Update hreflang links
        var enUrl = siteUrl + "/en";
        var arUrl = siteUrl + "/ar";

        var hreflangEn = document.querySelector(
          'link[rel="alternate"][hreflang="en"]'
        );
        if (hreflangEn) hreflangEn.setAttribute("href", enUrl);

        var hreflangAr = document.querySelector(
          'link[rel="alternate"][hreflang="ar"]'
        );
        if (hreflangAr) hreflangAr.setAttribute("href", arUrl);

        var hreflangDefault = document.querySelector(
          'link[rel="alternate"][hreflang="x-default"]'
        );
        if (hreflangDefault) hreflangDefault.setAttribute("href", enUrl);

        // Update canonical URL
        var canonical = document.querySelector('link[rel="canonical"]');
        if (canonical) canonical.setAttribute("href", currentUrl);
      })();
    </script>
    <script type="module" crossorigin src="/assets/index-GKtKNMLm.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-JqRsq-uP.css">
  </head>
  <body>
    <div id="root"></div>
    <!-- GitHub Pages SPA redirect handler -->
    <script>
      // Single Page Apps for GitHub Pages
      // Handles redirects from 404.html
      (function (l) {
        if (l.search[1] === "/" && l.search[0] === "?") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");

          // Ensure pathname ends with / for base path
          var pathname = l.pathname;
          if (!pathname.endsWith("/") && pathname.split("/").length <= 3) {
            pathname += "/";
          }

          window.history.replaceState(
            null,
            null,
            (pathname.endsWith("/") ? pathname.slice(0, -1) : pathname) +
              decoded +
              l.hash
          );
        }
      })(window.location);
    </script>
  </body>
</html>
